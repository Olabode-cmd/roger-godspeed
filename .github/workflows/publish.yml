name: Publish to NPM

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**/package.json'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Required to allow GitHub to prove its identity to NPM securely
    permissions:
      contents: read
      id-token: write 

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node (For NPM)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: bun install

      - name: Build Packages
        run: |
          cd packages/godspeed && bun run build
          cd ../cli && bun run build
          cd ../godspeed-websocket && bun run build
          cd ../godspeed-sse && bun run build

      - name: Publish Godspeed Core
        run: npm publish --access public
        working-directory: ./packages/godspeed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI
        run: npm publish --access public
        working-directory: ./packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish WebSocket Plugin
        run: npm publish --access public
        working-directory: ./packages/godspeed-websocket
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish SSE Plugin
        run: npm publish --access public
        working-directory: ./packages/godspeed-sse
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
